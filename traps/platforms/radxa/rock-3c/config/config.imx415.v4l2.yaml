# AI Camera Trap — V4L2 Configuration for Radxa Camera 4K (IMX415)
# ===============================================================
# Uses the generic V4L2 HAL instead of RKAIQ-based HAL.
# No ISP tuning files needed — sensor hardware handles AWB/AE.

camera:
  model: "v4l2"
  device: "/dev/video0"

  # IMX415 max resolution is 3840×2160, but we use 1920×1080 for performance
  full_w: 1920
  full_h: 1080

  med_w: 640
  med_h: 480

  lores_w: 320
  lores_h: 320

  fps: 15
  iq_dir: "/oem/usr/share/iqfiles"
  scene_dir: ""

inference:
  backend: "rknn"
  model_path: "/usr/share/ai-trap/yolo26n.rknn"
  confidence_threshold: 0.5

storage:
  output_dir: "/var/lib/ai-trap/data"
  db_path: "/var/lib/ai-trap/data/detections.json"

cropper:
  padding_px: 16
  min_confidence: 0.0

classifier:
  model_path: ""
  confidence_threshold: 0.5
  input_width: 224
  input_height: 224

actuator:
  type: "none"
  gpio: -1
  duration_ms: 3000

motion_sensor:
  gpio: -1

decision:
  trigger_confidence: 0.0
  cooldown_ms: 5000