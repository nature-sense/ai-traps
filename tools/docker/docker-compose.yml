# ─── docker-compose.yml ───────────────────────────────────────────────────────
# Docker Compose configuration for AI Camera Trap cross-compilation images.
#
# Build all images:
#   docker compose -f tools/docker/docker-compose.yml build
#
# Build a specific image:
#   docker compose -f tools/docker/docker-compose.yml build rock3c
#
# Run a build:
#   docker compose -f tools/docker/docker-compose.yml run --rm rock3c

services:
  rock3c:
    build:
      context: .
      dockerfile: rock3c.Dockerfile
    image: ai-trap-builder-rock3c
    container_name: ai-trap-build-rock3c
    platform: linux/amd64
    volumes:
      - ../..:/workspace
    working_dir: /workspace
    command: ["rock3c", "all", "detection"]

  cubie-a7s:
    build:
      context: .
      dockerfile: cubie-a7s.Dockerfile
    image: ai-trap-builder-cubie-a7s
    container_name: ai-trap-build-cubie-a7s
    platform: linux/amd64
    volumes:
      - ../..:/workspace
    working_dir: /workspace
    command: ["cubie-a7s", "all", "detection"]

  rdk-x5:
    build:
      context: .
      dockerfile: rdk-x5.Dockerfile
    image: ai-trap-builder-rdk-x5
    container_name: ai-trap-build-rdk-x5
    platform: linux/amd64
    volumes:
      - ../..:/workspace
    working_dir: /workspace
    command: ["rdk-x5", "all", "detection"]
