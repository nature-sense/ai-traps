# Meson cross-compilation file for RDK X5 (D-Robotics X5, aarch64)
# Uses Clang natively on macOS with a sysroot copied from the target board.
#
# Prerequisites:
#   brew install llvm meson ninja
#   export PATH="/opt/homebrew/opt/llvm/bin:$PATH"
#
# Usage:
#   meson setup build-rdk-x5 --cross-file ../tools/native/cross/aarch64-rdk-x5.ini -Dplatform=rdk-x5
#
# Sysroot setup:
#   tools/native/setup-sysroot.sh rdk-x5 root@rdk-x5.local

[binaries]
c = '/opt/homebrew/opt/llvm/bin/clang'
cpp = '/opt/homebrew/opt/llvm/bin/clang++'
ar = '/opt/homebrew/opt/llvm/bin/llvm-ar'
strip = '/opt/homebrew/opt/llvm/bin/llvm-strip'
ld = '/opt/homebrew/bin/ld.lld'
pkgconfig = '/Users/steve/naturesense/ai-traps/tools/native/sysroots/rdk-x5/bin/aarch64-pkg-config'
pkg-config = '/Users/steve/naturesense/ai-traps/tools/native/sysroots/rdk-x5/bin/aarch64-pkg-config'

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'armv8-a'
endian = 'little'

[built-in options]
c_args = ['-target', 'aarch64-linux-gnu', '--sysroot=/Users/steve/naturesense/ai-traps/tools/native/sysroots/rdk-x5']
c_link_args = ['-target', 'aarch64-linux-gnu', '--sysroot=/Users/steve/naturesense/ai-traps/tools/native/sysroots/rdk-x5', '-fuse-ld=lld', '--gcc-install-dir=/Users/steve/naturesense/ai-traps/tools/native/sysroots/rdk-x5/usr/lib/gcc/aarch64-linux-gnu/11']
cpp_args = ['-target', 'aarch64-linux-gnu', '--sysroot=/Users/steve/naturesense/ai-traps/tools/native/sysroots/rdk-x5', '-isystem', '/Users/steve/naturesense/ai-traps/tools/native/sysroots/rdk-x5/usr/include/c++/11', '-isystem', '/Users/steve/naturesense/ai-traps/tools/native/sysroots/rdk-x5/usr/include/aarch64-linux-gnu/c++/11']
cpp_link_args = ['-target', 'aarch64-linux-gnu', '--sysroot=/Users/steve/naturesense/ai-traps/tools/native/sysroots/rdk-x5', '-fuse-ld=lld', '--gcc-install-dir=/Users/steve/naturesense/ai-traps/tools/native/sysroots/rdk-x5/usr/lib/gcc/aarch64-linux-gnu/11']

[properties]
needs_exe_wrapper = false
pkg_config_libdir = '/Users/steve/naturesense/ai-traps/tools/native/sysroots/rdk-x5/usr/lib/aarch64-linux-gnu/pkgconfig:/Users/steve/naturesense/ai-traps/tools/native/sysroots/rdk-x5/usr/share/pkgconfig'
sys_root = '/Users/steve/naturesense/ai-traps/tools/native/sysroots/rdk-x5'
