# ─── rock3c-test.yaml ──────────────────────────────────────────────────────────
# Test configuration for ROCK 3C (RK3566) using SceneCameraActor.
# Reads pre-generated PNG frames from insect_loop_4 to verify:
#   - RKNN inference produces detections
#   - MJPEG stream serves frames via HTTP
#   - REST API endpoints respond correctly
#   - Session lifecycle (start/stop monitoring, crop storage)
#
# Usage:
#   ai-trap-detection --config /etc/ai-trap/rock3c-test.yaml

camera:
  model: "scene"
  scene_dir: "/home/radxa/testing/test_scenes/insect_loop_4"

  full_w: 1920
  full_h: 1080
  med_w: 640
  med_h: 480
  lores_w: 320
  lores_h: 320
  fps: 15
  device: ""
  iq_dir: ""

inference:
  backend: "rknn"
  model_path: "/usr/share/ai-trap/yolo26n.rknn"
  confidence_threshold: 0.5

storage:
  output_dir: "/tmp/ai-trap-test/detections"
  db_path: "/tmp/ai-trap-test/trap.db"

cropper:
  padding_px: 10
  min_confidence: 0.5

classifier:
  model_path: ""
  confidence_threshold: 0.0
  input_width: 0
  input_height: 0

actuator:
  type: "none"
  gpio: -1
  duration_ms: 0

motion_sensor:
  gpio: -1

decision:
  trigger_confidence: 0.6
  cooldown_ms: 3000
