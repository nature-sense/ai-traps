# ─── YOLO26n BPU Model Configuration ────────────────────────────────────

model_parameters:
  onnx_model: "/models/yolo26n.onnx"
  output_model_file_prefix: "yolo26n"
  remove_node_type: ""
  remove_node_name: ""

input_parameters:
  input_name: "images"
  input_type_rt: "nv12"
  input_type_train: "bgr"
  norm_type: "data_scale"
  scale_value: 0.00392156862745098
  input_shape: [1, 3, 320, 320]

calibration_parameters:
  cal_data_dir: "/models/"
  calibration_type: "max"
  max_percentile: 1.0
  per_channel: False

compile_parameters:
  compile_mode: "latency"
  optimize_level: "O3"
  debug: True
  max_time_per_task: 600
