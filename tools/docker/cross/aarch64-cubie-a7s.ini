# Meson cross-compilation file for Cubie A7S (Allwinner A527, aarch64)
#
# Usage:
#   meson setup build-cubie-a7s --cross-file ../tools/docker/cross/aarch64-cubie-a7s.ini -Dplatform=cubie-a7s

[binaries]
c = 'aarch64-linux-gnu-gcc'
cpp = 'aarch64-linux-gnu-g++'
ar = 'aarch64-linux-gnu-ar'
strip = 'aarch64-linux-gnu-strip'
pkgconfig = 'aarch64-linux-gnu-pkg-config'
pkg-config = 'aarch64-linux-gnu-pkg-config'

[built-in options]
c_args = ['-march=armv8-a+crc+crypto']
c_link_args = ['-march=armv8-a+crc+crypto']
cpp_args = ['-march=armv8-a+crc+crypto']
cpp_link_args = ['-march=armv8-a+crc+crypto']

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'armv8-a'
endian = 'little'

[properties]
sys_root = '/usr/aarch64-linux-gnu'
pkg_config_libdir = '/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig'
