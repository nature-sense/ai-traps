# Meson cross-compilation file for Cubie A7S (Allwinner A527, aarch64)
# Uses Clang natively on macOS with a sysroot copied from the target board.
#
# Prerequisites:
#   brew install llvm meson ninja
#   export PATH="/opt/homebrew/opt/llvm/bin:$PATH"
#
# Usage:
#   meson setup build-cubie-a7s --cross-file ../tools/native/cross/aarch64-cubie-a7s.ini -Dplatform=cubie-a7s
#
# Sysroot setup:
#   tools/native/setup-sysroot.sh cubie-a7s root@cubie-a7s.local

[binaries]
c = 'clang'
cpp = 'clang++'
ar = 'llvm-ar'
strip = 'llvm-strip'
ld = 'ld.lld'
pkgconfig = '/Users/steve/naturesense/ai-traps/tools/native/sysroots/cubie-a7s/bin/aarch64-pkg-config'
pkg-config = '/Users/steve/naturesense/ai-traps/tools/native/sysroots/cubie-a7s/bin/aarch64-pkg-config'

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'armv8.2-a'
endian = 'little'

[built-in options]
c_args = ['-target', 'aarch64-linux-gnu', '--sysroot=/Users/steve/naturesense/ai-traps/tools/native/sysroots/cubie-a7s', '-march=armv8.2-a+fp16+rcpc']
c_link_args = ['-target', 'aarch64-linux-gnu', '--sysroot=/Users/steve/naturesense/ai-traps/tools/native/sysroots/cubie-a7s', '-fuse-ld=lld', '-march=armv8.2-a+fp16+rcpc']
cpp_args = ['-target', 'aarch64-linux-gnu', '--sysroot=/Users/steve/naturesense/ai-traps/tools/native/sysroots/cubie-a7s', '-march=armv8.2-a+fp16+rcpc', '-isystem', '/Users/steve/naturesense/ai-traps/tools/native/sysroots/cubie-a7s/usr/include/c++/10', '-isystem', '/Users/steve/naturesense/ai-traps/tools/native/sysroots/cubie-a7s/usr/include/aarch64-linux-gnu/c++/10']
cpp_link_args = ['-target', 'aarch64-linux-gnu', '--sysroot=/Users/steve/naturesense/ai-traps/tools/native/sysroots/cubie-a7s', '-fuse-ld=lld', '-march=armv8.2-a+fp16+rcpc', '-isystem', '/Users/steve/naturesense/ai-traps/tools/native/sysroots/cubie-a7s/usr/include/c++/10', '-isystem', '/Users/steve/naturesense/ai-traps/tools/native/sysroots/cubie-a7s/usr/include/aarch64-linux-gnu/c++/10']

[properties]
needs_exe_wrapper = false
pkg_config_libdir = '/Users/steve/naturesense/ai-traps/tools/native/sysroots/cubie-a7s/usr/lib/aarch64-linux-gnu/pkgconfig:/Users/steve/naturesense/ai-traps/tools/native/sysroots/cubie-a7s/usr/share/pkgconfig'
sys_root = '/Users/steve/naturesense/ai-traps/tools/native/sysroots/cubie-a7s'