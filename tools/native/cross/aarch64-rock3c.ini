# Meson cross-compilation file for ROCK 3C (RK3566, aarch64)
# Uses Clang natively on macOS with a sysroot copied from the target board.
#
# Prerequisites:
#   brew install llvm meson ninja
#   export PATH="/opt/homebrew/opt/llvm/bin:$PATH"
#
# Usage:
#   meson setup build-rock3c --cross-file ../tools/native/cross/aarch64-rock3c.ini -Dplatform=rock3c
#
# Sysroot setup:
#   tools/native/setup-sysroot.sh rock3c root@rock-3c.local

[binaries]
c = 'clang'
cpp = 'clang++'
ar = '/opt/homebrew/opt/llvm/bin/llvm-ar'
strip = '/opt/homebrew/opt/llvm/bin/llvm-strip'
ld = '/opt/homebrew/bin/ld.lld'


pkgconfig = '/Users/steve/naturesense/ai-traps/tools/native/sysroots/rock3c/bin/aarch64-pkg-config'
pkg-config = '/Users/steve/naturesense/ai-traps/tools/native/sysroots/rock3c/bin/aarch64-pkg-config'

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'armv8-a'
endian = 'little'

[built-in options]
c_args = ['-target', 'aarch64-linux-gnu', '--sysroot=/Users/steve/naturesense/ai-traps/tools/native/sysroots/rock3c', '-march=armv8.2-a+crc']
c_link_args = ['-target', 'aarch64-linux-gnu', '--sysroot=/Users/steve/naturesense/ai-traps/tools/native/sysroots/rock3c', '-fuse-ld=lld', '-march=armv8.2-a+crc']
cpp_args = ['-target', 'aarch64-linux-gnu', '--sysroot=/Users/steve/naturesense/ai-traps/tools/native/sysroots/rock3c', '-march=armv8.2-a+crc', '-I/Users/steve/naturesense/ai-traps/tools/native/sysroots/rock3c/usr/include/c++/12', '-I/Users/steve/naturesense/ai-traps/tools/native/sysroots/rock3c/usr/include/aarch64-linux-gnu/c++/12', '-I/Users/steve/naturesense/ai-traps/tools/native/sysroots/rock3c/usr/include']
cpp_link_args = ['-target', 'aarch64-linux-gnu', '--sysroot=/Users/steve/naturesense/ai-traps/tools/native/sysroots/rock3c', '-fuse-ld=lld', '-march=armv8.2-a+crc']

[properties]
needs_exe_wrapper = false
pkg_config_libdir = '/Users/steve/naturesense/ai-traps/tools/native/sysroots/rock3c/usr/lib/aarch64-linux-gnu/pkgconfig:/Users/steve/naturesense/ai-traps/tools/native/sysroots/rock3c/usr/share/pkgconfig'
sys_root = '/Users/steve/naturesense/ai-traps/tools/native/sysroots/rock3c'
