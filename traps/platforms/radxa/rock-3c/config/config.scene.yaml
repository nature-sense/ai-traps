# ─── AI Camera Trap Runtime Configuration — ROCK 3C (RK3566) ─────────────────
# Camera: Scene actor (reads pre-generated PNG frames for testing)
# Inference: Rockchip NPU (RKNN model format) — YOLO26n
# Scaling: RGA hardware scaler
#
# Deploy to: /usr/share/ai-trap/config.yaml
# Model:    /usr/share/ai-trap/yolo26n.rknn
#
# Usage:
#   Deploy scenes/ directory alongside this config to /usr/share/ai-trap/
#   Then run: ai-trap-detection /etc/ai-trap/config.yaml

camera:
  model: "scene"
  scene_dir: "/usr/share/ai-trap/scenes/insect_loop_4"

  full_w: 1920
  full_h: 1080
  med_w: 640
  med_h: 480
  lores_w: 320
  lores_h: 320
  fps: 15
  device: ""
  iq_dir: ""

inference:
  backend: "rknn"
  model_path: "/usr/share/ai-trap/yolo26n.rknn"
  confidence_threshold: 0.5

storage:
  output_dir: "/tmp/ai-trap-test/detections"
  db_path: "/tmp/ai-trap-test/trap.db"

cropper:
  padding_px: 10
  min_confidence: 0.5

classifier:
  model_path: ""
  confidence_threshold: 0.0
  input_width: 0
  input_height: 0

actuator:
  type: "none"
  gpio: -1
  duration_ms: 0

motion_sensor:
  gpio: -1

decision:
  trigger_confidence: 0.6
  cooldown_ms: 3000
