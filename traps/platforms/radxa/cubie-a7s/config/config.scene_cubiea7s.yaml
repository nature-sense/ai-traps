# ─── AI Camera Trap Scene-Actor Config — Cubie A7S ─────────────────────────
# Camera: Scene actor (reads pre-generated PNG frames for testing)
# Inference: Vivante BPU (NBG model format) — YOLO26n
# Scaling: CPU-based (no RGA hardware scaler)
#
# Deploy to: /etc/ai-trap/config.yaml on cubie-a7s
# Model:     /usr/share/ai-trap/yolo26n.nbg
# Scenes:    /usr/share/ai-trap/scenes/insect_loop_4/
#
# Usage:
#   ai-trap-detection /etc/ai-trap/config.yaml
#
# NOTE: Before running, ensure Vivante NPU userspace libraries are installed:
#   libOpenVX.so, libGAL.so, libovxlib.so, libVSC.so, libCLC.so
#   These come from the Radxa Model Zoo container or BSP packages.
#
# To generate yolo26n.nbg:
#   1. docker pull zifengzp/ubuntu-npu:v2.0.10.1
#   Or use the Docker image in docker_images_v2.0.x/:
#      cd docker_images_v2.0.x && unzip ubuntu-npu_v2.0.10.2.tar.zip
#      docker load -i ubuntu-npu_v2.0.10.2.tar
#   2. docker run --rm -v $(pwd)/models/detection/insects/yolo26n:/data \
#        ubuntu-npu:v2.0.10.2 \
#        bash -c "source /root/acuity-toolkit-whl-*/bin/activate && \
#          python3 convert.py --model /data/best.onnx --target A733 --output /data/yolo26n.nbg"
#   3. scp models/detection/insects/yolo26n/yolo26n.nbg cubie-a7s:/usr/share/ai-trap/

camera:
  model: "scene"
  scene_dir: "/usr/share/ai-trap/scenes/insect_loop_4"

  full_w: 1920
  full_h: 1080
  med_w: 640
  med_h: 480
  lores_w: 320
  lores_h: 320
  fps: 15
  device: ""
  iq_dir: ""

inference:
  backend: "bpu"
  model_path: "/usr/share/ai-trap/yolo26n.nbg"
  confidence_threshold: 0.5

storage:
  output_dir: "/tmp/ai-trap-test/detections"
  db_path: "/tmp/ai-trap-test/trap.db"

cropper:
  padding_px: 10
  min_confidence: 0.5

classifier:
  model_path: ""
  confidence_threshold: 0.0
  input_width: 0
  input_height: 0

actuator:
  type: "none"
  gpio: -1
  duration_ms: 0

motion_sensor:
  gpio: -1

decision:
  trigger_confidence: 0.6
  cooldown_ms: 3000